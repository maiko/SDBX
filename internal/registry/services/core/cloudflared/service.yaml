apiVersion: sdbx.one/v1
kind: Service
metadata:
  name: cloudflared
  version: 1.0.0
  category: networking
  description: "Cloudflare Tunnel client for zero-trust access"
  homepage: https://www.cloudflare.com/products/tunnel/
  documentation: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
  maintainer: sdbx-official
  tags:
    - cloudflare
    - tunnel
    - networking
    - security

spec:
  image:
    repository: cloudflare/cloudflared
    tag: latest
    registry: docker.io

  container:
    name_template: "sdbx-{{ .Name }}"
    restart: unless-stopped
    command: tunnel run

  environment:
    static:
      - name: TZ
        value: "{{ .Config.Timezone }}"
      - name: TUNNEL_TOKEN
        valueFrom:
          secretRef: cloudflared_tunnel_token

  healthCheck:
    test: ["CMD", "pgrep", "cloudflared"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 15s

  volumes:
    - name: config
      hostPath: "./configs/cloudflared"
      containerPath: /etc/cloudflared

  networking:
    networks:
      - name: proxy

  dependencies:
    required:
      - traefik

secrets:
  - name: cloudflared_tunnel_token
    type: manual
    description: "Cloudflare Tunnel token from dashboard"

routing:
  enabled: false

integrations:
  watchtower:
    enabled: true
  cloudflared:
    enabled: false
  homepage:
    enabled: false

conditions:
  requireConfig: cloudflared
