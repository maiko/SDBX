{{define "layouts/wizard.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDBX Setup Wizard</title>
    <link rel="stylesheet" href="/static/css/colors.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/htmx.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .wizard-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 3rem;
        }

        .wizard-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .wizard-logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-primary), var(--color-info));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .wizard-subtitle {
            color: var(--color-muted);
            font-size: 0.95rem;
        }

        /* Step progress indicator */
        .wizard-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }

        .wizard-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .wizard-step-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .wizard-step.completed .wizard-step-circle {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .wizard-step.active .wizard-step-circle {
            border-color: var(--color-primary);
            color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .wizard-step-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.35rem;
            white-space: nowrap;
            font-weight: 500;
        }

        .wizard-step.completed .wizard-step-label,
        .wizard-step.active .wizard-step-label {
            color: var(--color-primary);
        }

        .wizard-step-connector {
            flex: 1;
            height: 2px;
            background: #e2e8f0;
            margin: 0 0.25rem;
            margin-bottom: 1.2rem;
            min-width: 20px;
            transition: background 0.3s;
        }

        .wizard-step-connector.completed {
            background: var(--color-primary);
        }

        .wizard-content {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .form-group .description {
            display: block;
            font-size: 0.85rem;
            color: var(--color-muted);
            margin-bottom: 0.5rem;
        }

        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        /* Field validation states */
        .form-group input.field-error,
        .form-group select.field-error {
            border-color: var(--color-error);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .form-group input.field-valid,
        .form-group select.field-valid {
            border-color: var(--color-success);
        }

        .field-error-msg {
            display: none;
            font-size: 0.8rem;
            color: var(--color-error);
            margin-top: 0.35rem;
        }

        .field-error-msg.visible {
            display: block;
        }

        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #64748b;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .wizard-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .error-message {
            background: #fef2f2;
            color: var(--color-error);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .addon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .addon-card {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .addon-card:hover {
            border-color: var(--color-primary);
        }

        .addon-card.selected {
            border-color: var(--color-primary);
            background: rgba(124, 58, 237, 0.05);
        }

        .addon-card input[type="checkbox"] {
            margin-right: 0.5rem;
        }

        .addon-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .addon-description {
            font-size: 0.85rem;
            color: var(--color-muted);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .summary-label {
            font-weight: 600;
            color: var(--color-muted);
        }

        .summary-value {
            color: #333;
        }

        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: wizard-spin 0.6s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes wizard-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <script>
        document.addEventListener('htmx:configRequest', function(event) {
            var match = document.cookie.match('(^|;)\\s*csrf_token=([^;]+)');
            if (match) event.detail.headers['X-CSRF-Token'] = match[2];
        });
    </script>
    <div class="wizard-container">
        <div class="wizard-header">
            <div class="wizard-logo">SDBX</div>
            <div class="wizard-subtitle">Seedbox in a Box - Setup Wizard</div>
        </div>
        <div class="wizard-progress" id="wizard-progress" style="display: none;"></div>
        <div id="wizard-error" class="error-message" style="display: none;"></div>
        <div class="wizard-content">
            {{block "page-content" .}}{{end}}
        </div>
    </div>

    <script>
        (function() {
            var stepNames = ['Domain', 'Admin', 'Storage', 'VPN', 'Addons', 'Summary'];
            var totalSteps = stepNames.length;
            var checkmark = document.createTextNode('\u2713');

            function buildProgress(currentStep) {
                var container = document.getElementById('wizard-progress');
                if (!container || currentStep < 1) {
                    if (container) container.style.display = 'none';
                    return;
                }
                container.style.display = 'flex';
                while (container.firstChild) container.removeChild(container.firstChild);

                for (var i = 0; i < totalSteps; i++) {
                    if (i > 0) {
                        var conn = document.createElement('div');
                        conn.className = 'wizard-step-connector';
                        if (i < currentStep) conn.className += ' completed';
                        container.appendChild(conn);
                    }

                    var step = document.createElement('div');
                    step.className = 'wizard-step';
                    if (i + 1 < currentStep) step.className += ' completed';
                    else if (i + 1 === currentStep) step.className += ' active';

                    var circle = document.createElement('div');
                    circle.className = 'wizard-step-circle';
                    if (i + 1 < currentStep) {
                        circle.textContent = '\u2713';
                    } else {
                        circle.textContent = String(i + 1);
                    }

                    var label = document.createElement('div');
                    label.className = 'wizard-step-label';
                    label.textContent = stepNames[i];

                    step.appendChild(circle);
                    step.appendChild(label);
                    container.appendChild(step);
                }
            }

            function initProgress() {
                var marker = document.querySelector('[data-wizard-step]');
                if (marker) {
                    buildProgress(parseInt(marker.getAttribute('data-wizard-step'), 10));
                } else {
                    var container = document.getElementById('wizard-progress');
                    if (container) container.style.display = 'none';
                }
            }

            initProgress();

            /* U2: Inline validation errors from server responses */
            var errorDiv = document.getElementById('wizard-error');

            document.body.addEventListener('htmx:beforeRequest', function() {
                if (errorDiv) {
                    errorDiv.style.display = 'none';
                    errorDiv.textContent = '';
                }
            });

            document.body.addEventListener('htmx:responseError', function(evt) {
                if (errorDiv && evt.detail && evt.detail.xhr) {
                    var status = evt.detail.xhr.status;
                    if (status >= 400 && status < 500) {
                        errorDiv.textContent = evt.detail.xhr.responseText || 'An error occurred. Please check your input.';
                        errorDiv.style.display = 'block';
                    }
                }
            });
        })();
    </script>
</body>
</html>
{{end}}
